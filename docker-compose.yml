version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      # Mount kubeconfig directory to access local cluster credentials from container
      - ~/.kube:/root/.kube:ro
      # Optional: mount backend directory for live code reloading during development
      - ./backend:/app/backend
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}  # Default provider is gemini
      - KUBECONFIG=/root/.kube/config
      - PORT=8000
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
    extra_hosts:
      # Allows backend to reach the Kind control plane API on the host
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
